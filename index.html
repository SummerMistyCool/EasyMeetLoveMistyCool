<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
    <title>易遇🩷雾凉</title>
    <style>
        /* ================================================================
           易遇🩷雾凉 v1.1.0 — 完整样式表
           ================================================================ */
        :root {
            --paper-white: #f8f4e8;
            --moonlight-warm: #F7F4ED;
            --moonlight-cool: #F4F6F9;
            --milk-white: #fefcf5;
            --ink-gray: #4a423b;
            --light-ink: #8b8178;
            --lighter-ink: #b5a89a;
            --cool-gray-blue: #b8c0c8;
            --heart-pink: #e8b4b8;
            --shadow-color: rgba(139, 129, 120, 0.08);
            --toast-bg: #e8dff0;
            --btn-green: #7ab89a;
            --btn-green-shadow: rgba(122, 184, 154, 0.3);
            --font-serif: 'Noto Serif SC', 'STSong', 'SimSun', 'Songti SC', 'KaiTi', 'STKaiti', serif;
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --avatar-size: 36px;
            --btn-icon-size: 38px;
            --input-height: 42px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: var(--font-serif);
            background: #f0ece2;
            -webkit-user-select: none;
            user-select: none;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            max-width: 480px;
            margin: 0 auto;
            position: relative;
            background: var(--paper-white);
            box-shadow: 0 0 60px rgba(0,0,0,0.05);
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.35;
            background-image: url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.25;
            background:
                radial-gradient(ellipse at 20% 15%, rgba(210,195,170,0.04) 0%, transparent 55%),
                radial-gradient(ellipse at 75% 55%, rgba(185,175,200,0.04) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 85%, rgba(200,190,175,0.03) 0%, transparent 50%);
        }

        ::-webkit-scrollbar { width: 0; height: 0; }

        .view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            z-index: 1;
            background: var(--paper-white);
        }
        .view.active { display: flex; }

        #chatView { display: flex; flex-direction: column; height: 100%; }

        .chat-header {
            padding: 14px 16px 6px;
            text-align: center;
            flex-shrink: 0;
            position: relative;
            z-index: 2;
            background: var(--paper-white);
        }
        .header-avatars {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            margin-bottom: 6px;
        }
        .header-avatar {
            width: var(--avatar-size);
            height: var(--avatar-size);
            border-radius: 7px;
            object-fit: cover;
            background: var(--moonlight-warm);
            flex-shrink: 0;
            box-shadow: 0 1px 2px var(--shadow-color);
        }

        .heart-chain {
            display: flex;
            align-items: center;
            gap: 1.5px;
            flex-shrink: 0;
            padding: 0 4px;
        }
        .heart-chain .heart {
            font-size: 13px;
            display: inline-block;
            color: var(--heart-pink);
            will-change: transform;
        }
        @keyframes hb-center {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.16); }
        }
        @keyframes hb-close {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.09); }
        }
        @keyframes hb-mid {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        @keyframes hb-outer {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }
        .heart-chain .heart:nth-child(5) { animation: hb-center 0.833s ease-in-out infinite; }
        .heart-chain .heart:nth-child(4),
        .heart-chain .heart:nth-child(6) { animation: hb-close 1s ease-in-out infinite; animation-delay: 0.2s; }
        .heart-chain .heart:nth-child(3),
        .heart-chain .heart:nth-child(7) { animation: hb-mid 1.25s ease-in-out infinite; animation-delay: 0.35s; }
        .heart-chain .heart:nth-child(2),
        .heart-chain .heart:nth-child(8) { animation: hb-outer 1.67s ease-in-out infinite; animation-delay: 0.5s; }
        .heart-chain .heart:nth-child(1),
        .heart-chain .heart:nth-child(9) { animation: hb-outer 2s ease-in-out infinite; animation-delay: 0.6s; }

        .header-nicknames {
            font-size: 13px;
            color: var(--light-ink);
            letter-spacing: 1.5px;
            font-family: var(--font-serif);
        }

        .status-area {
            padding: 0 16px;
            text-align: center;
            flex-shrink: 0;
            min-height: 0;
            transition: all 0.3s ease;
        }
        .his-status {
            font-size: 12px;
            line-height: 1.5;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px 16px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            -webkit-overflow-scrolling: touch;
        }
        .message-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            max-width: 100%;
        }
        .message-row.mine { flex-direction: row-reverse; }
        .message-avatar {
            width: var(--avatar-size);
            height: var(--avatar-size);
            border-radius: 7px;
            object-fit: cover;
            flex-shrink: 0;
            background: var(--moonlight-warm);
            box-shadow: 0 1px 2px var(--shadow-color);
        }
        .message-content { max-width: 72%; display: flex; flex-direction: column; }
        .message-bubble {
            padding: 10px 14px;
            border-radius: var(--radius-md);
            font-size: 15px;
            line-height: 1.65;
            word-break: break-word;
            position: relative;
            box-shadow: 0 1px 3px var(--shadow-color);
            font-family: var(--font-serif);
        }
        .message-row.mine .message-bubble {
            background: var(--moonlight-cool);
            border-bottom-right-radius: 2px;
        }
        .message-row.theirs .message-bubble {
            background: var(--moonlight-warm);
            border-bottom-left-radius: 2px;
        }
        .message-bubble img { max-width: 200px; border-radius: 4px; display: block; }

        .quote-bar {
            display: flex;
            align-items: flex-start;
            gap: 6px;
            margin-bottom: 4px;
            padding: 6px 10px;
            background: rgba(248,244,232,0.7);
            border-left: 2px solid var(--cool-gray-blue);
            border-radius: 2px;
            font-size: 13px;
            color: var(--lighter-ink);
            cursor: pointer;
            word-break: break-word;
            line-height: 1.4;
        }

        .message-meta {
            font-size: 11px;
            color: var(--lighter-ink);
            margin-top: 3px;
            display: flex;
            align-items: center;
            gap: 4px;
            font-family: var(--font-serif);
        }
        .message-row.mine .message-meta { justify-content: flex-end; }
        .check-mark {
            font-family: 'KaiTi','STKaiti','Noto Serif SC',serif;
            font-style: italic;
            font-size: 12px;
        }
        .check-mark.read { opacity: 1; color: var(--light-ink); }
        .check-mark.unread { opacity: 0.45; }
        .quote-indicator { cursor: pointer; font-size: 13px; color: var(--light-ink); }

        .typing-indicator {
            text-align: center;
            font-size: 11px;
            color: var(--lighter-ink);
            padding: 6px;
            opacity: 0;
            transition: opacity 0.35s ease;
            flex-shrink: 0;
            font-family: var(--font-serif);
            font-style: italic;
        }
        .typing-indicator.visible { opacity: 0.7; }

        .chat-footer {
            padding: 8px 12px 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
            background: var(--paper-white);
        }
        .input-wrapper {
            flex: 1;
            background: var(--moonlight-cool);
            border-radius: var(--radius-md);
            box-shadow: inset 0 1px 2px var(--shadow-color);
            height: var(--input-height);
            display: flex;
            align-items: center;
            padding: 0 12px;
        }
        .chat-input {
            flex: 1;
            border: none;
            background: transparent;
            font-family: var(--font-serif);
            font-size: 15px;
            color: var(--ink-gray);
            outline: none;
            height: 100%;
            -webkit-user-select: text;
            user-select: text;
        }
        .chat-input::placeholder { color: var(--lighter-ink); font-size: 13.5px; font-style: italic; }

        .btn-smile {
            width: var(--btn-icon-size);
            height: var(--btn-icon-size);
            border: 1.5px solid var(--lighter-ink);
            border-radius: 50%;
            background: transparent;
            cursor: pointer;
            flex-shrink: 0;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .smile-face { width: 17px; height: 17px; position: relative; }
        .smile-face::before,
        .smile-face::after {
            content: '';
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--lighter-ink);
            border-radius: 50%;
            top: 5px;
        }
        .smile-face::before { left: 3px; }
        .smile-face::after { right: 3px; }
        .smile-mouth {
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 5px;
            border-bottom: 1.5px solid var(--lighter-ink);
            border-radius: 0 0 10px 10px;
        }

        .btn-plus {
            width: var(--btn-icon-size);
            height: var(--btn-icon-size);
            border-radius: 50%;
            background: var(--milk-white);
            box-shadow: 0 1px 3px var(--shadow-color);
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--light-ink);
            border: none;
            font-family: var(--font-serif);
        }

        .btn-send {
            height: var(--btn-icon-size);
            padding: 0 16px;
            border-radius: var(--radius-sm);
            background: var(--milk-white);
            box-shadow: 0 1px 3px var(--shadow-color);
            cursor: pointer;
            flex-shrink: 0;
            font-family: var(--font-serif);
            font-size: 14px;
            color: var(--ink-gray);
            border: none;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.15s ease;
            white-space: nowrap;
        }
        .btn-send.visible { opacity: 1; pointer-events: auto; }
        .btn-send:active { transform: scale(0.95); }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.18);
            z-index: 10;
            display: none;
        }
        .overlay.active { display: block; }

        .plus-popup {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            max-width: 480px;
            width: 100%;
            background: var(--paper-white);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            z-index: 15;
            padding: 20px 16px 30px;
            transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .plus-popup.active { transform: translateX(-50%) translateY(0); }
        .plus-card {
            background: var(--milk-white);
            border-radius: var(--radius-md);
            padding: 18px 12px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 1px 3px var(--shadow-color);
            transition: transform 0.15s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 7px;
        }
        .plus-card:active { transform: scale(0.96); }
        .plus-card .card-icon { font-size: 28px; }
        .plus-card .card-label { font-size: 13px; color: var(--light-ink); font-family: var(--font-serif); }
        .plus-card.full-width { grid-column: 1 / -1; }

        .emoji-popup {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            max-width: 480px;
            width: 100%;
            background: var(--paper-white);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            z-index: 15;
            padding: 16px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 55vh;
            overflow-y: auto;
        }
        .emoji-popup.active { transform: translateX(-50%) translateY(0); }
        .emoji-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .emoji-item {
            aspect-ratio: 1;
            background: var(--milk-white);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            box-shadow: 0 1px 2px var(--shadow-color);
        }
        .emoji-item img { width: 100%; height: 100%; object-fit: cover; }
        .emoji-add {
            aspect-ratio: 1;
            background: var(--moonlight-warm);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 26px;
            color: var(--lighter-ink);
            border: 1.5px dashed var(--lighter-ink);
        }

        .toast-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 19;
            display: none;
            background: rgba(0,0,0,0.14);
        }
        .toast-overlay.active { display: block; }
        .toast-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--toast-bg);
            border-radius: var(--radius-lg);
            padding: 26px 30px;
            z-index: 20;
            text-align: center;
            box-shadow: 0 6px 24px rgba(139, 129, 120, 0.18);
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            min-width: 230px;
        }
        .toast-popup.active { display: flex; }
        .toast-heart { font-size: 30px; }
        .toast-text { font-size: 14px; color: var(--ink-gray); font-family: var(--font-serif); line-height: 1.6; white-space: pre-line; }
        .toast-btn {
            margin-top: 8px;
            padding: 9px 30px;
            border-radius: 22px;
            border: none;
            cursor: pointer;
            font-family: var(--font-serif);
            font-size: 14px;
            color: #fff;
            background: var(--btn-green);
            box-shadow: 0 2px 8px var(--btn-green-shadow);
            transition: transform 0.15s ease;
        }
        .toast-btn:active { transform: scale(0.95); }

        .fullscreen-page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            background: var(--paper-white);
            display: none;
            flex-direction: column;
        }
        .fullscreen-page.active { display: flex; }
        .page-header {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            background: var(--paper-white);
        }
        .btn-back {
            width: 38px;
            height: 38px;
            border-radius: var(--radius-md);
            background: var(--milk-white);
            box-shadow: 0 1px 3px var(--shadow-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 21px;
            color: var(--ink-gray);
            border: none;
            flex-shrink: 0;
            text-decoration: none;
        }
        .page-title { font-size: 17px; color: var(--ink-gray); font-family: var(--font-serif); letter-spacing: 1px; }
        .page-content { flex: 1; overflow-y: auto; padding: 4px 16px 24px; -webkit-overflow-scrolling: touch; }

        .more-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding-top: 8px; }
        .more-card {
            background: var(--milk-white);
            border-radius: var(--radius-md);
            padding: 18px 8px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 1px 3px var(--shadow-color);
            transition: transform 0.15s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 7px;
        }
        .more-card:active { transform: scale(0.96); }
        .more-card .card-icon { font-size: 27px; }
        .more-card .card-label { font-size: 12px; color: var(--light-ink); font-family: var(--font-serif); line-height: 1.3; }
        .version-info {
            text-align: center;
            font-size: 11px;
            color: var(--lighter-ink);
            padding: 22px 0 12px;
            font-family: var(--font-serif);
            letter-spacing: 0.5px;
        }

        .settings-tabs {
            display: flex;
            gap: 0;
            padding: 0 16px;
            overflow-x: auto;
            flex-shrink: 0;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            background: var(--paper-white);
        }
        .settings-tab {
            flex-shrink: 0;
            padding: 9px 15px;
            font-size: 13px;
            color: var(--lighter-ink);
            cursor: pointer;
            font-family: var(--font-serif);
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .settings-tab.active { color: var(--ink-gray); border-bottom-color: var(--heart-pink); }
        .settings-panel { display: none; flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }
        .settings-panel.active { display: block; }
        .settings-card {
            background: var(--milk-white);
            border-radius: var(--radius-md);
            padding: 15px 16px;
            margin-bottom: 10px;
            cursor: pointer;
            box-shadow: 0 1px 3px var(--shadow-color);
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--font-serif);
            font-size: 14px;
            color: var(--ink-gray);
            transition: transform 0.15s ease;
        }
        .settings-card:active { transform: scale(0.98); }
        .settings-card .s-icon { font-size: 22px; }
        .settings-dev { padding: 14px 16px; color: var(--lighter-ink); font-size: 13px; font-family: var(--font-serif); text-align: center; }
        .settings-section-title { font-size: 13px; color: var(--lighter-ink); margin: 6px 0 10px; font-family: var(--font-serif); letter-spacing: 0.5px; }

        .reshape-slider {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            flex: 1;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }
        .reshape-page {
            flex-shrink: 0;
            width: 100%;
            scroll-snap-align: start;
            overflow-y: auto;
            padding: 16px 16px 24px;
            -webkit-overflow-scrolling: touch;
        }
        .reshape-title { text-align: center; font-size: 14.5px; color: var(--light-ink); margin-bottom: 18px; font-family: var(--font-serif); letter-spacing: 1px; }
        .reshape-avatar-area { text-align: center; margin-bottom: 24px; }
        .reshape-avatar {
            width: 72px;
            height: 72px;
            border-radius: var(--radius-md);
            object-fit: cover;
            background: var(--moonlight-warm);
            box-shadow: 0 2px 6px var(--shadow-color);
        }
        .btn-change-avatar {
            font-size: 13px;
            color: var(--light-ink);
            cursor: pointer;
            font-family: var(--font-serif);
            text-decoration: underline;
            text-underline-offset: 3px;
            background: none;
            border: none;
            margin-top: 8px;
        }
        .reshape-field { margin-bottom: 20px; }
        .reshape-field label { display: block; font-size: 13px; color: var(--light-ink); margin-bottom: 6px; font-family: var(--font-serif); }
        .reshape-input {
            width: 100%;
            padding: 10px 14px;
            border: none;
            border-radius: var(--radius-sm);
            background: var(--moonlight-cool);
            font-family: var(--font-serif);
            font-size: 15px;
            color: var(--ink-gray);
            outline: none;
            box-shadow: inset 0 1px 2px var(--shadow-color);
        }
        .reshape-input::placeholder { color: var(--lighter-ink); }
        .btn-save-reshape {
            display: block;
            width: 100%;
            padding: 13px;
            margin-top: 10px;
            border: none;
            border-radius: var(--radius-md);
            background: var(--milk-white);
            font-family: var(--font-serif);
            font-size: 15px;
            color: var(--ink-gray);
            cursor: pointer;
            box-shadow: 0 1px 3px var(--shadow-color);
            letter-spacing: 2px;
            transition: transform 0.15s ease;
        }
        .btn-save-reshape:active { transform: scale(0.97); }
        .bg-preview {
            width: 100%;
            height: 80px;
            border-radius: var(--radius-sm);
            background: var(--moonlight-cool);
            margin-bottom: 8px;
            background-size: cover;
            background-position: center;
            box-shadow: inset 0 1px 2px var(--shadow-color);
        }

        .call-screen {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            max-width: 480px;
            width: 100%;
            height: 100%;
            z-index: 20;
            background: var(--paper-white);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;

<script>
(function() {
'use strict';

// ==================== Service Worker ====================
if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
        var swCode = 'var CACHE_NAME="yiwu-v1.1.0";self.addEventListener("install",function(e){e.waitUntil(caches.open(CACHE_NAME).then(function(c){return c.addAll(["/"])}))});self.addEventListener("fetch",function(e){e.respondWith(caches.match(e.request).then(function(r){return r||fetch(e.request)}))});';
        var blob = new Blob([swCode], {type:'application/javascript'});
        var swUrl = URL.createObjectURL(blob);
        navigator.serviceWorker.register(swUrl).catch(function(){});
    });
}

// ==================== LocalStorage ====================
var LS = {
    get: function(key, def) {
        try { var v = localStorage.getItem('yw_'+key); return v !== null ? JSON.parse(v) : def; }
        catch(e) { return def; }
    },
    set: function(key, val) {
        try { localStorage.setItem('yw_'+key, JSON.stringify(val)); }
        catch(e) { showToast('存储空间不足'); }
    }
};

// ==================== IndexedDB ====================
var DB_NAME = 'YiWuChat', DB_VERSION = 1, db = null;

function openDB() {
    return new Promise(function(rs, rj) {
        var r = indexedDB.open(DB_NAME, DB_VERSION);
        r.onupgradeneeded = function(e) {
            var d = e.target.result;
            if (!d.objectStoreNames.contains('messages')) {
                var s = d.createObjectStore('messages', {keyPath:'id', autoIncrement:true});
                s.createIndex('timestamp','timestamp',{unique:false});
            }
            if (!d.objectStoreNames.contains('emojis')) {
                d.createObjectStore('emojis', {keyPath:'id', autoIncrement:true});
            }
        };
        r.onsuccess = function(e) { db = e.target.result; rs(db); };
        r.onerror = function() { rj(r.error); };
    });
}

function dbAdd(sn, data) {
    return new Promise(function(rs, rj) {
        var tx = db.transaction(sn,'readwrite'), st = tx.objectStore(sn);
        var r = st.add(data); r.onsuccess = function() { rs(r.result); }; r.onerror = function() { rj(r.error); };
    });
}

function dbPut(sn, data) {
    return new Promise(function(rs, rj) {
        var tx = db.transaction(sn,'readwrite'), st = tx.objectStore(sn);
        var r = st.put(data); r.onsuccess = function() { rs(r.result); }; r.onerror = function() { rj(r.error); };
    });
}

function dbGetAll(sn) {
    return new Promise(function(rs, rj) {
        var tx = db.transaction(sn,'readonly'), st = tx.objectStore(sn);
        var r = st.getAll(); r.onsuccess = function() { rs(r.result); }; r.onerror = function() { rj(r.error); };
    });
}

function dbGetPaginated(sn, offset, limit) {
    return new Promise(function(rs, rj) {
        var tx = db.transaction(sn,'readonly'), st = tx.objectStore(sn);
        var idx = st.index('timestamp'), results = [], count = 0, skipped = 0;
        var r = idx.openCursor(null, 'prev');
        r.onsuccess = function(e) {
            var c = e.target.result;
            if (!c) { rs(results.reverse()); return; }
            if (skipped < offset) { skipped++; c.continue(); return; }
            if (count >= limit) { rs(results.reverse()); return; }
            results.push(c.value); count++; c.continue();
        };
        r.onerror = function() { rj(r.error); };
    });
}

function dbClear(sn) {
    return new Promise(function(rs, rj) {
        var tx = db.transaction(sn,'readwrite'), st = tx.objectStore(sn);
        var r = st.clear(); r.onsuccess = function() { rs(); }; r.onerror = function() { rj(r.error); };
    });
}

function dbDelete(sn, id) {
    return new Promise(function(rs, rj) {
        var tx = db.transaction(sn,'readwrite'), st = tx.objectStore(sn);
        var r = st.delete(id); r.onsuccess = function() { rs(); }; r.onerror = function() { rj(r.error); };
    });
}

// ==================== 全局状态 ====================
var state = {
    hisName:'易遇', hisNick:'老公', myName:'雾凉', myNick:'乖宝',
    hisAvatar:'', myAvatar:'', hisStatus:'', hisSignature:'', chatBg:'',
    wordCards:[], emojis:[], messagesLoaded:0, PAGE_SIZE:50,
    currentCallType:null, callStartTime:null, callInterval:null,
    quotingId:null, quotingText:'',
    autoReplyTimeout:null, activeChatTimeout:null, statusChangeTimeout:null,
    lastUserMessageTime:0
};

function $(s) { return document.querySelector(s); }
function $$(s) { return document.querySelectorAll(s); }

// ==================== 初始化 ====================
async function initApp() {
    await openDB();
    loadSettings();
    await loadEmojis();
    await loadMessages();
    updateAllChatUI();
    bindEvents();
    startStatusCycle();
    startActiveChat();
    if (state.messagesLoaded === 0) $('#messagesContainer').innerHTML = '';
}

function loadSettings() {
    state.hisName = LS.get('hisName','易遇'); state.hisNick = LS.get('hisNick','老公');
    state.myName = LS.get('myName','雾凉'); state.myNick = LS.get('myNick','乖宝');
    state.hisAvatar = LS.get('hisAvatar',''); state.myAvatar = LS.get('myAvatar','');
    state.hisStatus = LS.get('hisStatus',''); state.hisSignature = LS.get('hisSignature','');
    state.chatBg = LS.get('chatBg',''); state.wordCards = LS.get('wordCards',[]);
}

function saveSettings() {
    LS.set('hisName',state.hisName); LS.set('hisNick',state.hisNick);
    LS.set('myName',state.myName); LS.set('myNick',state.myNick);
    LS.set('hisAvatar',state.hisAvatar); LS.set('myAvatar',state.myAvatar);
    LS.set('hisStatus',state.hisStatus); LS.set('hisSignature',state.hisSignature);
    LS.set('chatBg',state.chatBg); LS.set('wordCards',state.wordCards);
}

// ==================== 表情 ====================
async function loadEmojis() { state.emojis = await dbGetAll('emojis'); renderEmojiGrid(); }

function renderEmojiGrid() {
    var g = $('#emojiGrid'); if (!g) return; g.innerHTML = '';
    state.emojis.forEach(function(e) {
        var d = document.createElement('div'); d.className = 'emoji-item';
        var img = document.createElement('img'); img.src = e.data; img.alt = '表情';
        d.appendChild(img); d.onclick = function() { sendEmoji(e.data); }; g.appendChild(d);
    });
    var add = document.createElement('div'); add.className = 'emoji-add'; add.textContent = '+';
    add.onclick = addEmoji; g.appendChild(add);
}

function addEmoji() {
    var inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'image/*';
    inp.onchange = async function(e) {
        var f = e.target.files[0]; if (!f) return;
        var reader = new FileReader();
        reader.onload = async function(ev) {
            await dbAdd('emojis', {data:ev.target.result, timestamp:Date.now()});
            await loadEmojis();
        };
        reader.readAsDataURL(f);
    }; inp.click();
}

function sendEmoji(data) { closeEmojiPanel(); sendMessage(data, 'image'); }

// ==================== 消息 ====================
async function loadMessages() {
    var msgs = await dbGetPaginated('messages', 0, state.PAGE_SIZE);
    state.messagesLoaded = msgs.length; renderAllMessages(msgs);
    if (msgs.length > 0) setTimeout(function() {
        $('#messagesContainer').scrollTop = $('#messagesContainer').scrollHeight;
    }, 150);
}

function renderAllMessages(msgs) {
    var c = $('#messagesContainer'); c.innerHTML = '';
    msgs.forEach(function(m) { renderOneMessage(m, c); });
}

function renderOneMessage(msg, container) {
    var isMine = msg.sender === 'me';
    var row = document.createElement('div');
    row.className = 'message-row ' + (isMine ? 'mine' : 'theirs');
    row.dataset.msgId = msg.id;

    var av = document.createElement('img'); av.className = 'message-avatar';
    if (isMine) { if (state.myAvatar) av.src = state.myAvatar; else av.style.display = 'none'; }
    else { if (state.hisAvatar) av.src = state.hisAvatar; else av.style.display = 'none'; }
    row.appendChild(av);

    var cw = document.createElement('div'); cw.className = 'message-content';

    if (msg.quoteId !== null && msg.quoteId !== undefined && msg.quoteId !== '') {
        var qb = document.createElement('div'); qb.className = 'quote-bar';
        qb.onclick = function() { scrollToMsg(msg.quoteId); };
        qb.innerHTML = '<span class="quote-text">' + escHTML(msg.quoteText || '引用消息') + '</span>';
        cw.appendChild(qb);
    }

    var bub = document.createElement('div'); bub.className = 'message-bubble';
    if (msg.type === 'image') { var im = document.createElement('img'); im.src = msg.content; im.style.maxWidth = '100%'; bub.appendChild(im); }
    else if (msg.type === 'call') { bub.textContent = msg.content; bub.style.fontStyle = 'italic'; }
    else { bub.textContent = msg.content; }
    cw.appendChild(bub);

    var meta = document.createElement('div'); meta.className = 'message-meta';
    if (isMine) {
        var ck = document.createElement('span'); ck.className = 'check-mark ' + (msg.read ? 'read' : 'unread');
        ck.textContent = msg.read ? '✓✓' : '✓'; meta.appendChild(ck);
        if (msg.quotedBy && msg.quotedBy.length > 0) {
            var qi = document.createElement('span'); qi.className = 'quote-indicator'; qi.textContent = '↩';
            qi.onclick = function() { scrollToMsg(msg.quotedBy[0]); }; meta.appendChild(qi);
        }
        meta.appendChild(document.createElement('span')).textContent = formatTime(msg.timestamp);
    } else {
        if (msg.quotedBy && msg.quotedBy.length > 0) {
            var qi2 = document.createElement('span'); qi2.className = 'quote-indicator'; qi2.textContent = '↩'; meta.appendChild(qi2);
        }
        meta.appendChild(document.createElement('span')).textContent = formatTime(msg.timestamp);
    }
    cw.appendChild(meta); row.appendChild(cw); container.appendChild(row);
}

function appendMsg(msg) { renderOneMessage(msg, $('#messagesContainer')); $('#messagesContainer').scrollTop = $('#messagesContainer').scrollHeight; }

function formatTime(ts) {
    var d = new Date(ts);
    return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function escHTML(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ==================== 发送消息 ====================
async function sendMessage(content, type, quoteId, quoteText) {
    var qId = state.quotingId || quoteId || null;
    var qText = state.quotingText || quoteText || '';
    state.quotingId = null; state.quotingText = null;

    var msg = { sender:'me', content:content, type:type||'text', timestamp:Date.now(), read:false, quoteId:qId, quoteText:qText, quotedBy:[] };
    var id = await dbAdd('messages', msg); msg.id = id;
    state.messagesLoaded++; state.lastUserMessageTime = Date.now();
    appendMsg(msg);

    if (qId) { await updateQuotedBy(qId, id); }

    scheduleAutoReply();
}

async function updateQuotedBy(quotedMsgId, newMsgId) {
    var all = await dbGetAll('messages');
    var target = all.find(function(m) { return m.id === quotedMsgId; });
    if (target) {
        if (!target.quotedBy) target.quotedBy = [];
        target.quotedBy.push(newMsgId);
        await dbPut('messages', target);
    }
}

// ==================== 自动回复 ====================
function scheduleAutoReply() {
    clearTimeout(state.autoReplyTimeout);
    $('#typingIndicator').classList.add('visible'); markAllRead();
    var delay = 6000 + Math.random() * 54000;
    state.autoReplyTimeout = setTimeout(async function() {
        $('#typingIndicator').classList.remove('visible');
        await doAutoReply();
    }, delay);
}

function markAllRead() {
    $$('.message-row.mine .check-mark.unread').forEach(function(ck) {
        ck.classList.remove('unread'); ck.classList.add('read'); ck.textContent = '✓✓';
    });
}

async function doAutoReply() {
    if (state.wordCards.length === 0) { showToast('他没有可说的话…\n去字卡库为他准备一些话语吧'); return; }
    var card = state.wordCards[Math.floor(Math.random() * state.wordCards.length)];
    var msg = { sender:'him', content:card, type:'text', timestamp:Date.now(), quoteId:null, quoteText:'', quotedBy:[] };
    var id = await dbAdd('messages', msg); msg.id = id;
    state.messagesLoaded++; appendMsg(msg);
}

// ==================== 主动聊天 ====================
function startActiveChat() { scheduleActiveCheck(); }

function scheduleActiveCheck() {
    clearTimeout(state.activeChatTimeout);
    var delay = 300000 + Math.random() * 300000;
    state.activeChatTimeout = setTimeout(function() { checkActiveChat(); scheduleActiveCheck(); }, delay);
}

async function checkActiveChat() {
    if (Date.now() - state.lastUserMessageTime < 60000) return;
    if (Math.random() > 0.2) return;
    if (state.wordCards.length === 0) return;
    $('#typingIndicator').classList.add('visible'); markAllRead();
    var delay = 2000 + Math.random() * 4000;
    setTimeout(async function() {
        $('#typingIndicator').classList.remove('visible');
        var card = state.wordCards[Math.floor(Math.random() * state.wordCards.length)];
        var msg = { sender:'him', content:card, type:'text', timestamp:Date.now(), quoteId:null, quoteText:'', quotedBy:[] };
        var id = await dbAdd('messages', msg); msg.id = id;
        state.messagesLoaded++; appendMsg(msg);
    }, delay);
}

// ==================== 状态栏循环 ====================
function startStatusCycle() { applyStatus(); scheduleStatusChange(); }

function scheduleStatusChange() {
    clearTimeout(state.statusChangeTimeout);
    var delay = 3600000 + Math.random() * 14400000;
    state.statusChangeTimeout = setTimeout(function() { applyStatus(); scheduleStatusChange(); }, delay);
}

function applyStatus() {
    var text = '';
    if (state.hisStatus) text = state.hisStatus;
    if (state.hisStatus && state.hisSignature) text += '，' + state.hisSignature;
    else if (!state.hisStatus && state.hisSignature) text = state.hisSignature;
    if (text) {
        $('#hisStatus').textContent = text;
        applyRandomGradient($('#hisStatus'));
        $('#statusArea').style.display = '';
    } else { $('#statusArea').style.display = 'none'; }
}

function applyRandomGradient(el) {
    var h1 = Math.floor(Math.random()*360), h2 = (h1+Math.floor(Math.random()*60)+20)%360;
    el.style.background = 'linear-gradient(135deg, hsl('+h1+',15%,82%), hsl('+h2+',15%,88%))';
    el.style.webkitBackgroundClip = 'text'; el.style.webkitTextFillColor = 'transparent'; el.style.backgroundClip = 'text';
}

// ==================== UI 更新 ====================
function updateAllChatUI() {
    $$('.his-avatar').forEach(function(img) {
        if (state.hisAvatar) { img.src = state.hisAvatar; img.style.display = ''; } else img.style.display = 'none';
    });
    $$('.my-avatar').forEach(function(img) {
        if (state.myAvatar) { img.src = state.myAvatar; img.style.display = ''; } else img.style.display = 'none';
    });
    $('#headerNicknames').textContent = (state.hisNick||'梦角') + '🩷' + (state.myNick||'我');
    applyStatus();
    $('#chatInput').placeholder = state.hisNick ? '对'+state.hisNick+'说点什么...' : '对梦角说点什么...';
    var mc = $('#messagesContainer');
    if (state.chatBg) {
        mc.style.backgroundImage = 'url('+state.chatBg+')';
        mc.style.backgroundSize = 'contain'; mc.style.backgroundRepeat = 'no-repeat';
        mc.style.backgroundPosition = 'center'; mc.style.backgroundAttachment = 'fixed';
    } else { mc.style.backgroundImage = ''; }
    var bp = $('#bgPreview'); if (bp && state.chatBg) bp.style.backgroundImage = 'url('+state.chatBg+')';
    syncReshape();
}

function syncReshape() {
    if (!$('#reshapeDreamName')) return;
    $('#reshapeDreamName').value = state.hisName; $('#reshapeHisNick').value = state.hisNick;
    $('#reshapeCallMe').value = state.myNick; $('#reshapeSignature').value = state.hisSignature;
    $('#reshapeMyName').value = state.myName;
    if (state.hisAvatar) { $('#reshapeHisAvatar').src = state.hisAvatar; $('#reshapeHisAvatar').style.display = ''; }
    if (state.myAvatar) { $('#reshapeMyAvatar').src = state.myAvatar; $('#reshapeMyAvatar').style.display = ''; }
    if (state.chatBg) $('#bgPreview').style.backgroundImage = 'url('+state.chatBg+')';
}

// ==================== 提示框 ====================
function showToast(text) { $('#toastText').textContent = text; $('#toastPopup').classList.add('active'); $('#toastOverlay').classList.add('active'); }
function closeToast() { $('#toastPopup').classList.remove('active'); $('#toastOverlay').classList.remove('active'); }

// ==================== ⊕ 弹窗 ====================
function openPlus() { $('#plusPopup').classList.add('active'); $('#plusOverlay').classList.add('active'); }
function closePlus() { $('#plusPopup').classList.remove('active'); $('#plusOverlay').classList.remove('active'); }

function openPhoto() { closePlus(); pickImage(function(data) { sendMessage(data, 'image'); }); }
function openCamera() { closePlus(); pickImage(function(data) { sendMessage(data, 'image'); }, true); }

function pickImage(cb, capture) {
    var inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'image/*';
    if (capture) inp.capture = 'environment';
    inp.onchange = function(e) { var f = e.target.files[0]; if (!f) return; var r = new FileReader(); r.onload = function(ev) { cb(ev.target.result); }; r.readAsDataURL(f); };
    inp.click();
}

function startCall(type) {
    closePlus(); state.currentCallType = type;
    var sc = $('#callScreen'); if (state.hisAvatar) { $('#callAvatar').src = state.hisAvatar; $('#callAvatar').style.display = ''; }
    sc.classList.add('active'); state.callStartTime = Date.now(); $('#callTimer').textContent = '00:00';
    state.callInterval = setInterval(function() {
        var e = Math.floor((Date.now() - state.callStartTime) / 1000);
        $('#callTimer').textContent = String(Math.floor(e/60)).padStart(2,'0') + ':' + String(e%60).padStart(2,'0');
    }, 1000);
}

function endCall() {
    clearInterval(state.callInterval); var e = Math.floor((Date.now() - state.callStartTime) / 1000);
    var dur = String(Math.floor(e/60)).padStart(2,'0') + ':' + String(e%60).padStart(2,'0');
    var ct = state.currentCallType === 'voice' ? '语音通话' : '视频通话';
    sendMessage(ct + ' · ' + dur, 'call');
    $('#callScreen').classList.remove('active'); state.callStartTime = null; state.currentCallType = null;
}

// ==================== 表情面板 ====================
function openEmoji() { $('#emojiPopup').classList.add('active'); $('#emojiOverlay').classList.add('active'); }
function closeEmojiPanel() { $('#emojiPopup').classList.remove('active'); $('#emojiOverlay').classList.remove('active'); }

// ==================== 引用跳转 ====================
function scrollToMsg(id) {
    var row = $('#messagesContainer').querySelector('[data-msg-id="'+id+'"]');
    if (row) { row.scrollIntoView({behavior:'smooth',block:'center'}); row.style.background = 'rgba(232,180,184,0.2)'; setTimeout(function() { row.style.background = ''; }, 1800); }
}

// ==================== 发送按钮 ====================
function updateSendBtn() {
    var btn = $('#btnSend');
    if ($('#chatInput').value.trim()) btn.classList.add('visible'); else btn.classList.remove('visible');
}

// ==================== 页面跳转 ====================
function openMorePage() { $('#morePage').classList.add('active'); $('#chatView').classList.remove('active'); buildMoreGrid(); }
function closeMorePage() { $('#morePage').classList.remove('active'); $('#chatView').classList.add('active'); }
function openSettingsPage() { closeMorePage(); $('#settingsPage').classList.add('active'); $('#chatView').classList.remove('active'); buildSettings(); setTimeout(bindDataEvents, 300); }
function closeSettingsPage() { $('#settingsPage').classList.remove('active'); $('#chatView').classList.add('active'); }
function openReshapePage() { closeMorePage(); syncReshape(); $('#reshapePage').classList.add('active'); $('#chatView').classList.remove('active'); }
function closeReshapePage() { $('#reshapePage').classList.remove('active'); $('#chatView').classList.add('active'); }

// ==================== 更多功能 ====================
var moreFeatures = [
    { icon:'🌐', label:'朋友圈' }, { icon:'✉️', label:'信件邮递' }, { icon:'📨', label:'传讯' },
    { icon:'💕', label:'恋爱日记' }, { icon:'☁️', label:'小世界' }, { icon:'🎵', label:'一起听歌' },
    { icon:'⚖️', label:'决策' }, { icon:'🌸', label:'纪念日' }, { icon:'📞', label:'通话记录' },
    { icon:'💭', label:'记忆重塑', action:function() { openReshapePage(); } },
    { icon:'📑', label:'字卡库' }, { icon:'📊', label:'数据统计' },
    { icon:'⚙️', label:'设置', action:function() { openSettingsPage(); } }
];

function buildMoreGrid() {
    var g = $('#moreGrid'); if (!g) return; g.innerHTML = '';
    moreFeatures.forEach(function(f) {
        var c = document.createElement('div'); c.className = 'more-card';
        c.innerHTML = '<span class="card-icon">'+f.icon+'</span><span class="card-label">'+f.label+'</span>';
        c.onclick = function() { if (f.action) f.action(); else showToast(f.label+'\n待开发'); };
        g.appendChild(c);
    });
}

// ==================== 设置 ====================
var settingsTabsData = [
    { icon:'🎨', label:'主题切换', content:'dev' }, { icon:'💬', label:'自定义气泡样式', content:'dev' },
    { icon:'⚡', label:'系统频率控制', content:'dev' }, { icon:'📦', label:'数据管理', content:'data' },
    { icon:'🗑', label:'删除记录', content:'dev' }, { icon:'🌙', label:'易遇的独白', content:'dev' }
];

function buildSettings() {
    var tc = $('#settingsTabs'), pc = $('#settingsPanels');
    if (!tc || !pc) return; tc.innerHTML = ''; pc.innerHTML = '';
    settingsTabsData.forEach(function(t, i) {
        var tab = document.createElement('div'); tab.className = 'settings-tab' + (i===3?' active':'');
        tab.textContent = t.icon + ' ' + t.label; tab.onclick = function() { switchSettingsTab(i); };
        tc.appendChild(tab);
        var pan = document.createElement('div'); pan.className = 'settings-panel' + (i===3?' active':'');
        pan.id = 'settingsPanel'+i;
        pan.innerHTML = t.content === 'dev' ? '<div class="settings-dev">待开发</div>' : buildDataHTML();
        pc.appendChild(pan);
    });
}

function switchSettingsTab(i) {
    $$('.settings-tab').forEach(function(t, j) { t.classList.toggle('active', j===i); });
    $$('.settings-panel').forEach(function(p, j) { p.classList.toggle('active', j===i); });
    if (i === 3) setTimeout(bindDataEvents, 200);
}

function buildDataHTML() {
    return [
        '<div class="settings-section-title">—— 导出 ——</div>',
        '<div class="settings-card" id="exportFull"><span class="s-icon">📤</span> 全量备份</div>',
        '<div class="settings-card" id="exportLight"><span class="s-icon">📋</span> 轻备份（不含图片）</div>',
        '<div class="settings-card" id="exportChat"><span class="s-icon">📝</span> 导出聊天记录</div>',
        '<div class="settings-section-title" style="margin-top:10px;">—— 导入 ——</div>',
        '<div class="settings-card" id="importFull"><span class="s-icon">📥</span> 覆盖导入备份</div>',
        '<div class="settings-card" id="importWordCards"><span class="s-icon">📄</span> 导入字卡JSON</div>'
    ].join('');
}

function bindDataEvents() {
    var ef = $('#exportFull'), el = $('#exportLight'), ec = $('#exportChat');
    var imf = $('#importFull'), iwc = $('#importWordCards');
    if (ef) ef.onclick = exportFullBackup; if (el) el.onclick = exportLightBackup;
    if (ec) ec.onclick = exportChatRecords; if (imf) imf.onclick = importFullBackup;
    if (iwc) iwc.onclick = importWordCardsJSON;
}

// ==================== 导入导出 ====================
async function getAllData() {
    return {
        version:'1.1.0', exportTime: new Date().toISOString(),
        settings: { hisName:state.hisName, hisNick:state.hisNick, myName:state.myName, myNick:state.myNick,
            hisAvatar:state.hisAvatar, myAvatar:state.myAvatar, hisStatus:state.hisStatus,
            hisSignature:state.hisSignature, chatBg:state.chatBg, wordCards:state.wordCards },
        messages: await dbGetAll('messages'), emojis: await dbGetAll('emojis')
    };
}

function downloadJSON(data, fn) {
    var blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
    var url = URL.createObjectURL(blob), a = document.createElement('a');
    a.href = url; a.download = fn; document.body.appendChild(a); a.click();
    document.body.removeChild(a); setTimeout(function() { URL.revokeObjectURL(url); }, 100);
}

function getDateStr() { var d = new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

async function exportFullBackup() { var d = await getAllData(); downloadJSON(d, '易遇雾凉_全量备份_'+getDateStr()+'.json'); showToast('📤 全量备份已导出'); }
async function exportLightBackup() {
    var d = await getAllData(); d.emojis = [];
    d.settings.hisAvatar = d.settings.hisAvatar ? '[图片已省略]' : '';
    d.settings.myAvatar = d.settings.myAvatar ? '[图片已省略]' : '';
    d.settings.chatBg = d.settings.chatBg ? '[图片已省略]' : '';
    d.messages = d.messages.map(function(m) { if (m.type==='image') { var c = Object.assign({},m); c.content='[图片已省略]'; return c; } return m; });
    downloadJSON(d, '易遇雾凉_轻备份_'+getDateStr()+'.json'); showToast('📋 轻备份已导出');
}
async function exportChatRecords() {
    var msgs = await dbGetAll('messages');
    var txt = msgs.filter(function(m) { return m.type==='text'||m.type==='call'; }).map(function(m) {
        return '['+formatTime(m.timestamp)+'] '+(m.sender==='me'?(state.myNick||'我'):(state.hisNick||'梦角'))+': '+m.content;
    }).join('\n');
    var blob = new Blob([txt], {type:'text/plain;charset=UTF-8'});
    var url = URL.createObjectURL(blob), a = document.createElement('a');
    a.href = url; a.download = '易遇雾凉_聊天记录_'+getDateStr()+'.txt';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 100); showToast('📝 聊天记录已导出');
}
function importFullBackup() {
    var inp = document.createElement('input'); inp.type = 'file'; inp.accept = '.json';
    inp.onchange = async function(e) {
        var f = e.target.files[0]; if (!f) return;
        var reader = new FileReader();
        reader.onload = async function(ev) {
            try {
                var d = JSON.parse(ev.target.result);
                if (!d.version) { showToast('无效的备份文件'); return; }
                await dbClear('messages'); await dbClear('emojis');
                if (d.messages) for (var i=0; i<d.messages.length; i++) await dbAdd('messages', d.messages[i]);
                if (d.emojis) for (var j=0; j<d.emojis.length; j++) await dbAdd('emojis', d.emojis[j]);
                if (d.settings) {
                    var s = d.settings;
                    state.hisName=s.hisName||'易遇'; state.hisNick=s.hisNick||'老公';
                    state.myName=s.myName||'雾凉'; state.myNick=s.myNick||'乖宝';
                    state.hisAvatar=s.hisAvatar||''; state.myAvatar=s.myAvatar||'';
                    state.hisStatus=s.hisStatus||''; state.hisSignature=s.hisSignature||'';
                    state.chatBg=s.chatBg||''; state.wordCards=s.wordCards||[];
                    saveSettings();
                }
                state.messagesLoaded = 0; await loadMessages(); await loadEmojis();
                updateAllChatUI(); showToast('📥 备份已覆盖导入');
            } catch(e) { showToast('导入失败，文件格式错误'); }
        }; reader.readAsText(f);
    }; inp.click();
}
function importWordCardsJSON() {
    var inp = document.createElement('input'); inp.type = 'file'; inp.accept = '.json';
    inp.onchange = function(e) {
        var f = e.target.files[0]; if (!f) return;
        var reader = new FileReader();
        reader.onload = function(ev) {
            try {
                var d = JSON.parse(ev.target.result), cards = d.wordCards || d;
                if (Array.isArray(cards)) { state.wordCards = cards; saveSettings(); showToast('📄 字卡已导入，共 '+cards.length+' 条'); }
                else showToast('格式错误');
            } catch(e) { showToast('导入失败'); }
        }; reader.readAsText(f);
    }; inp.click();
}

// ==================== 记忆重塑 ====================
function changeAvatar(type) {
    var inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'image/*';
    inp.onchange = function(e) {
        var f = e.target.files[0]; if (!f) return;
        var reader = new FileReader();
        reader.onload = function(ev) {
            var data = ev.target.result;
            if (type==='his') { state.hisAvatar = data; $('#reshapeHisAvatar').src = data; $('#reshapeHisAvatar').style.display = ''; }
            else { state.myAvatar = data; $('#reshapeMyAvatar').src = data; $('#reshapeMyAvatar').style.display = ''; }
            saveSettings(); updateAllChatUI();
        }; reader.readAsDataURL(f);
    }; inp.click();
}

function changeChatBg() {
    var inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'image/*';
    inp.onchange = function(e) {
        var f = e.target.files[0]; if (!f) return;
        var reader = new FileReader();
        reader.onload = function(ev) {
            var img = new Image(); img.onload = function() {
                var canvas = document.createElement('canvas'), maxW = 480, scale = maxW / img.width;
                canvas.width = maxW; canvas.height = Math.floor(img.height * scale);
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                state.chatBg = canvas.toDataURL('image/jpeg', 0.8);
                saveSettings(); updateAllChatUI(); showToast('聊天背景已更新');
            }; img.src = ev.target.result;
        }; reader.readAsDataURL(f);
    }; inp.click();
}

function saveReshape() {
    state.hisName = $('#reshapeDreamName').value || '易遇'; state.hisNick = $('#reshapeHisNick').value || '老公';
    state.myNick = $('#reshapeCallMe').value || '乖宝'; state.hisSignature = $('#reshapeSignature').value || '';
    state.myName = $('#reshapeMyName').value || '雾凉';
    saveSettings(); updateAllChatUI(); showToast('铭刻于心底\n已保存');
}

// ==================== 事件绑定 ====================
function bindEvents() {
    $('#btnPlus').onclick = openPlus; $('#plusOverlay').onclick = closePlus;
    $('#plusPhoto').onclick = openPhoto; $('#plusCamera').onclick = openCamera;
    $('#plusVoiceCall').onclick = function() { startCall('voice'); };
    $('#plusVideoCall').onclick = function() { startCall('video'); };
    $('#plusTeachMode').onclick = function() { closePlus(); showToast('教学模式\n即将在后续版本开放'); };
    $('#plusMore').onclick = function() { closePlus(); openMorePage(); };

    $('#btnSmile').onclick = openEmoji; $('#emojiOverlay').onclick = closeEmojiPanel;

    $('#btnSend').onclick = function() {
        var t = $('#chatInput').value.trim(); if (!t) return;
        $('#chatInput').value = ''; sendMessage(t, 'text'); updateSendBtn();
    };
    $('#chatInput').oninput = updateSendBtn;
    $('#chatInput').onkeydown = function(e) { if (e.key==='Enter') { e.preventDefault(); $('#btnSend').click(); } };

    $('#btnHangup').onclick = endCall;
    $('#toastOverlay').onclick = closeToast; $('#toastConfirmBtn').onclick = closeToast;

    $('#btnMoreBack').onclick = closeMorePage; $('#btnSettingsBack').onclick = closeSettingsPage;
    $('#btnReshapeBack').onclick = closeReshapePage;

    $('#btnChangeHisAvatar').onclick = function() { changeAvatar('his'); };
    $('#btnChangeMyAvatar').onclick = function() { changeAvatar('my'); };
    $('#btnChangeChatBg').onclick = changeChatBg;
    $('#btnSaveReshape1').onclick = saveReshape; $('#btnSaveReshape2').onclick = saveReshape;

    // 长按引用
    var longTimer = null, longTarget = null;
    var mc = $('#messagesContainer');
    mc.addEventListener('touchstart', function(e) {
        var bub = e.target.closest('.message-bubble'); if (!bub) return;
        longTarget = bub.closest('.message-row');
        longTimer = setTimeout(function() {
            if (longTarget) {
                state.quotingId = parseInt(longTarget.dataset.msgId);
                state.quotingText = longTarget.querySelector('.message-bubble').textContent;
                $('#chatInput').focus(); showToast('已引用消息，输入回复即可');
            } longTarget = null;
        }, 600);
    }, {passive:false});
    mc.addEventListener('touchend', function() { clearTimeout(longTimer); });
    mc.addEventListener('touchmove', function() { clearTimeout(longTimer); });
}

// ==================== 启动 ====================
initApp().then(function() { console.log('易遇🩷雾凉 v1.1.0 就绪'); }).catch(function(e) { console.error(e); });

})();
</script>
