<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
    <title>易遇🩷雾凉</title>
    <style>
        :root {
            --paper-white: #f8f4e8;
            --moonlight-warm: #F7F4ED;
            --moonlight-cool: #F4F6F9;
            --milk-white: #fefcf5;
            --ink-gray: #4a423b;
            --light-ink: #8b8178;
            --lighter-ink: #b5a89a;
            --cool-gray-blue: #b8c0c8;
            --heart-pink: #e8b4b8;
            --shadow-color: rgba(139, 129, 120, 0.08);
            --toast-bg: #e8dff0;
            --btn-green: #7ab89a;
            --btn-green-shadow: rgba(122, 184, 154, 0.3);
            --font-serif: 'Noto Serif SC', 'STSong', 'SimSun', 'Songti SC', 'KaiTi', 'STKaiti', serif;
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --avatar-size: 36px;
            --btn-icon-size: 38px;
            --input-height: 42px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html,body { height:100%; width:100%; overflow:hidden; font-family:var(--font-serif); background:#f0ece2; -webkit-user-select:none; user-select:none; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
        body { max-width:480px; margin:0 auto; position:relative; background:var(--paper-white); box-shadow:0 0 60px rgba(0,0,0,0.05); }
        body::before { content:''; position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; opacity:0.35; background-image:url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E"); }
        body::after { content:''; position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; opacity:0.25; background:radial-gradient(ellipse at 20% 15%, rgba(210,195,170,0.04) 0%, transparent 55%),radial-gradient(ellipse at 75% 55%, rgba(185,175,200,0.04) 0%, transparent 55%),radial-gradient(ellipse at 50% 85%, rgba(200,190,175,0.03) 0%, transparent 50%); }
        ::-webkit-scrollbar { width:0; height:0; }
        .view { position:absolute; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; z-index:1; background:var(--paper-white); }
        .view.active { display:flex; }
        #chatView { display:flex; flex-direction:column; height:100%; }
        .chat-header { padding:14px 16px 6px; text-align:center; flex-shrink:0; position:relative; z-index:2; background:var(--paper-white); }
        .header-avatars { display:flex; align-items:center; justify-content:center; gap:5px; margin-bottom:6px; }
        .header-avatar { width:var(--avatar-size); height:var(--avatar-size); border-radius:7px; object-fit:cover; background:var(--moonlight-warm); flex-shrink:0; box-shadow:0 1px 2px var(--shadow-color); }
        .heart-chain { display:flex; align-items:center; gap:1.5px; flex-shrink:0; padding:0 4px; }
        .heart-chain .heart { font-size:13px; display:inline-block; color:var(--heart-pink); will-change:transform; }
        @keyframes hb-center { 0%,100%{transform:scale(1)} 50%{transform:scale(1.16)} }
        @keyframes hb-close { 0%,100%{transform:scale(1)} 50%{transform:scale(1.09)} }
        @keyframes hb-mid { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
        @keyframes hb-outer { 0%,100%{transform:scale(1)} 50%{transform:scale(1.03)} }
        .heart-chain .heart:nth-child(5){animation:hb-center 0.833s ease-in-out infinite}
        .heart-chain .heart:nth-child(4),.heart-chain .heart:nth-child(6){animation:hb-close 1s ease-in-out infinite;animation-delay:0.2s}
        .heart-chain .heart:nth-child(3),.heart-chain .heart:nth-child(7){animation:hb-mid 1.25s ease-in-out infinite;animation-delay:0.35s}
        .heart-chain .heart:nth-child(2),.heart-chain .heart:nth-child(8){animation:hb-outer 1.67s ease-in-out infinite;animation-delay:0.5s}
        .heart-chain .heart:nth-child(1),.heart-chain .heart:nth-child(9){animation:hb-outer 2s ease-in-out infinite;animation-delay:0.6s}
        .header-nicknames { font-size:13px; color:var(--light-ink); letter-spacing:1.5px; font-family:var(--font-serif); }
        .status-area { padding:0 16px; text-align:center; flex-shrink:0; min-height:0; transition:all 0.3s ease; }
        .his-status { font-size:12px; line-height:1.5; }
        .messages-container { flex:1; overflow-y:auto; padding:10px 16px; display:flex; flex-direction:column; gap:18px; -webkit-overflow-scrolling:touch; }
        .message-row { display:flex; align-items:flex-start; gap:8px; max-width:100%; }
        .message-row.mine { flex-direction:row-reverse; }
        .message-avatar { width:var(--avatar-size); height:var(--avatar-size); border-radius:7px; object-fit:cover; flex-shrink:0; background:var(--moonlight-warm); box-shadow:0 1px 2px var(--shadow-color); }
        .message-content { max-width:72%; display:flex; flex-direction:column; }
        .message-bubble { padding:10px 14px; border-radius:var(--radius-md); font-size:15px; line-height:1.65; word-break:break-word; position:relative; box-shadow:0 1px 3px var(--shadow-color); font-family:var(--font-serif); }
        .message-row.mine .message-bubble { background:var(--moonlight-cool); border-bottom-right-radius:2px; }
        .message-row.theirs .message-bubble { background:var(--moonlight-warm); border-bottom-left-radius:2px; }
        .message-bubble img { max-width:200px; border-radius:4px; display:block; }
        .quote-bar { display:flex; align-items:flex-start; gap:6px; margin-bottom:4px; padding:6px 10px; background:rgba(248,244,232,0.7); border-left:2px solid var(--cool-gray-blue); border-radius:2px; font-size:13px; color:var(--lighter-ink); cursor:pointer; word-break:break-word; line-height:1.4; }
        .message-meta { font-size:11px; color:var(--lighter-ink); margin-top:3px; display:flex; align-items:center; gap:4px; font-family:var(--font-serif); }
        .message-row.mine .message-meta { justify-content:flex-end; }
        .check-mark { font-family:'KaiTi','STKaiti','Noto Serif SC',serif; font-style:italic; font-size:12px; }
        .check-mark.read { opacity:1; color:var(--light-ink); }
        .check-mark.unread { opacity:0.45; }
        .quote-indicator { cursor:pointer; font-size:13px; color:var(--light-ink); }
        .typing-indicator { text-align:center; font-size:11px; color:var(--lighter-ink); padding:6px; opacity:0; transition:opacity 0.35s ease; flex-shrink:0; font-family:var(--font-serif); font-style:italic; }
        .typing-indicator.visible { opacity:0.7; }
        .chat-footer { padding:8px 12px 14px; display:flex; align-items:center; gap:6px; flex-shrink:0; background:var(--paper-white); }
        .input-wrapper { flex:1; background:var(--moonlight-cool); border-radius:var(--radius-md); box-shadow:inset 0 1px 2px var(--shadow-color); height:var(--input-height); display:flex; align-items:center; padding:0 12px; }
        .chat-input { flex:1; border:none; background:transparent; font-family:var(--font-serif); font-size:15px; color:var(--ink-gray); outline:none; height:100%; -webkit-user-select:text; user-select:text; }
        .chat-input::placeholder { color:var(--lighter-ink); font-size:13.5px; font-style:italic; }
        .btn-smile { width:var(--btn-icon-size); height:var(--btn-icon-size); border:1.5px solid var(--lighter-ink); border-radius:50%; background:transparent; cursor:pointer; flex-shrink:0; position:relative; display:flex; align-items:center; justify-content:center; }
        .smile-face { width:17px; height:17px; position:relative; }
        .smile-face::before,.smile-face::after { content:''; position:absolute; width:3px; height:3px; background:var(--lighter-ink); border-radius:50%; top:5px; }
        .smile-face::before { left:3px; } .smile-face::after { right:3px; }
        .smile-mouth { position:absolute; bottom:2px; left:50%; transform:translateX(-50%); width:10px; height:5px; border-bottom:1.5px solid var(--lighter-ink); border-radius:0 0 10px 10px; }
        .btn-plus { width:var(--btn-icon-size); height:var(--btn-icon-size); border-radius:50%; background:var(--milk-white); box-shadow:0 1px 3px var(--shadow-color); cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:20px; color:var(--light-ink); border:none; font-family:var(--font-serif); }
        .btn-send { height:var(--btn-icon-size); padding:0 16px; border-radius:var(--radius-sm); background:var(--milk-white); box-shadow:0 1px 3px var(--shadow-color); cursor:pointer; flex-shrink:0; font-family:var(--font-serif); font-size:14px; color:var(--ink-gray); border:none; opacity:0; pointer-events:none; transition:opacity 0.2s ease, transform 0.15s ease; white-space:nowrap; }
        .btn-send.visible { opacity:1; pointer-events:auto; }
        .btn-send:active { transform:scale(0.95); }
        .overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.18); z-index:10; display:none; }
        .overlay.active { display:block; }
        .plus-popup { position:fixed; bottom:0; left:50%; transform:translateX(-50%) translateY(100%); max-width:480px; width:100%; background:var(--paper-white); border-radius:var(--radius-lg) var(--radius-lg) 0 0; z-index:15; padding:20px 16px 30px; transition:transform 0.32s cubic-bezier(0.4,0,0.2,1); display:grid; grid-template-columns:1fr 1fr; gap:12px; }
        .plus-popup.active { transform:translateX(-50%) translateY(0); }
        .plus-card { background:var(--milk-white); border-radius:var(--radius-md); padding:18px 12px; text-align:center; cursor:pointer; box-shadow:0 1px 3px var(--shadow-color); transition:transform 0.15s ease; display:flex; flex-direction:column; align-items:center; gap:7px; }
        .plus-card:active { transform:scale(0.96); }
        .plus-card .card-icon { font-size:28px; }
        .plus-card .card-label { font-size:13px; color:var(--light-ink); font-family:var(--font-serif); }
        .plus-card.full-width { grid-column:1/-1; }
        .emoji-popup { position:fixed; bottom:0; left:50%; transform:translateX(-50%) translateY(100%); max-width:480px; width:100%; background:var(--paper-white); border-radius:var(--radius-lg) var(--radius-lg) 0 0; z-index:15; padding:16px; transition:transform 0.3s cubic-bezier(0.4,0,0.2,1); max-height:55vh; overflow-y:auto; }
        .emoji-popup.active { transform:translateX(-50%) translateY(0); }
        .emoji-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
        .emoji-item { aspect-ratio:1; background:var(--milk-white); border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; cursor:pointer; overflow:hidden; box-shadow:0 1px 2px var(--shadow-color); }
        .emoji-item img { width:100%; height:100%; object-fit:cover; }
        .emoji-add { aspect-ratio:1; background:var(--moonlight-warm); border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:26px; color:var(--lighter-ink); border:1.5px dashed var(--lighter-ink); }
        .toast-overlay { position:fixed; top:0; left:0; width:100%; height:100%; z-index:19; display:none; background:rgba(0,0,0,0.14); }
        .toast-overlay.active { display:block; }
        .toast-popup { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:var(--toast-bg); border-radius:var(--radius-lg); padding:26px 30px; z-index:20; text-align:center; box-shadow:0 6px 24px rgba(139,129,120,0.18); display:none; flex-direction:column; align-items:center; gap:10px; min-width:230px; }
        .toast-popup.active { display:flex; }
        .toast-heart { font-size:30px; }
        .toast-text { font-size:14px; color:var(--ink-gray); font-family:var(--font-serif); line-height:1.6; white-space:pre-line; }
        .toast-btn { margin-top:8px; padding:9px 30px; border-radius:22px; border:none; cursor:pointer; font-family:var(--font-serif); font-size:14px; color:#fff; background:var(--btn-green); box-shadow:0 2px 8px var(--btn-green-shadow); transition:transform 0.15s ease; }
        .toast-btn:active { transform:scale(0.95); }
        .toast-btn.cancel { background:#c8c0b8; box-shadow:0 2px 8px rgba(180,170,160,0.3); }
        .toast-buttons { display:flex; gap:10px; margin-top:6px; justify-content:center; }
        .fullscreen-page { position:absolute; top:0; left:0; width:100%; height:100%; z-index:5; background:var(--paper-white); display:none; flex-direction:column; }
        .fullscreen-page.active { display:flex; }
        .page-header { padding:14px 16px; display:flex; align-items:center; gap:10px; flex-shrink:0; background:var(--paper-white); }
        .btn-back { width:38px; height:38px; border-radius:var(--radius-md); background:var(--milk-white); box-shadow:0 1px 3px var(--shadow-color); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:21px; color:var(--ink-gray); border:none; flex-shrink:0; text-decoration:none; }
        .page-title { font-size:17px; color:var(--ink-gray); font-family:var(--font-serif); letter-spacing:1px; }
        .page-content { flex:1; overflow-y:auto; padding:4px 16px 24px; -webkit-overflow-scrolling:touch; }
        .more-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; padding-top:8px; }
        .more-card { background:var(--milk-white); border-radius:var(--radius-md); padding:18px 8px; text-align:center; cursor:pointer; box-shadow:0 1px 3px var(--shadow-color); transition:transform 0.15s ease; display:flex; flex-direction:column; align-items:center; gap:7px; }
        .more-card:active { transform:scale(0.96); }
        .more-card .card-icon { font-size:27px; }
        .more-card .card-label { font-size:12px; color:var(--light-ink); font-family:var(--font-serif); line-height:1.3; }
        .version-info { text-align:center; font-size:11px; color:var(--lighter-ink); padding:22px 0 12px; font-family:var(--font-serif); letter-spacing:0.5px; }
        .settings-tabs { display:flex; gap:0; padding:0 16px; overflow-x:auto; flex-shrink:0; -webkit-overflow-scrolling:touch; scroll-behavior:smooth; background:var(--paper-white); }
        .settings-tab { flex-shrink:0; padding:9px 15px; font-size:13px; color:var(--lighter-ink); cursor:pointer; font-family:var(--font-serif); border-bottom:2px solid transparent; transition:all 0.2s; white-space:nowrap; }
        .settings-tab.active { color:var(--ink-gray); border-bottom-color:var(--heart-pink); }
        .settings-panel { display:none; flex:1; overflow-y:auto; padding:16px; -webkit-overflow-scrolling:touch; }
        .settings-panel.active { display:block; }
        .settings-card { background:var(--milk-white); border-radius:var(--radius-md); padding:15px 16px; margin-bottom:10px; cursor:pointer; box-shadow:0 1px 3px var(--shadow-color); display:flex; align-items:center; gap:10px; font-family:var(--font-serif); font-size:14px; color:var(--ink-gray); transition:transform 0.15s ease; }
        .settings-card:active { transform:scale(0.98); }
        .settings-card .s-icon { font-size:22px; }
        .settings-dev { padding:14px 16px; color:var(--lighter-ink); font-size:13px; font-family:var(--font-serif); text-align:center; }
        .settings-section-title { font-size:13px; color:var(--lighter-ink); margin:6px 0 10px; font-family:var(--font-serif); letter-spacing:0.5px; }
        .reshape-slider { display:flex; overflow-x:auto; scroll-snap-type:x mandatory; flex:1; -webkit-overflow-scrolling:touch; scroll-behavior:smooth; }
        .reshape-page { flex-shrink:0; width:100%; scroll-snap-align:start; overflow-y:auto; padding:16px 16px 24px; -webkit-overflow-scrolling:touch; }
        .reshape-title { text-align:center; font-size:14.5px; color:var(--light-ink); margin-bottom:18px; font-family:var(--font-serif); letter-spacing:1px; }
        .reshape-avatar-area { text-align:center; margin-bottom:24px; }
        .reshape-avatar { width:72px; height:72px; border-radius:var(--radius-md); object-fit:cover; background:var(--moonlight-warm); box-shadow:0 2px 6px var(--shadow-color); }
        .btn-change-avatar { font-size:13px; color:var(--light-ink); cursor:pointer; font-family:var(--font-serif); text-decoration:underline; text-underline-offset:3px; background:none; border:none; margin-top:8px; }
        .reshape-field { margin-bottom:20px; }
        .reshape-field label { display:block; font-size:13px; color:var(--light-ink); margin-bottom:6px; font-family:var(--font-serif); }
        .reshape-input { width:100%; padding:10px 14px; border:none; border-radius:var(--radius-sm); background:var(--moonlight-cool); font-family:var(--font-serif); font-size:15px; color:var(--ink-gray); outline:none; box-shadow:inset 0 1px 2px var(--shadow-color); }
        .reshape-input::placeholder { color:var(--lighter-ink); }
        .btn-save-reshape { display:block; width:100%; padding:13px; margin-top:10px; border:none; border-radius:var(--radius-md); background:var(--milk-white); font-family:var(--font-serif); font-size:15px; color:var(--ink-gray); cursor:pointer; box-shadow:0 1px 3px var(--shadow-color); letter-spacing:2px; transition:transform 0.15s ease; }
        .btn-save-reshape:active { transform:scale(0.97); }
        .bg-preview { width:100%; height:80px; border-radius:var(--radius-sm); background:var(--moonlight-cool); margin-bottom:8px; background-size:cover; background-position:center; box-shadow:inset 0 1px 2px var(--shadow-color); }
        .call-screen { position:fixed; top:0; left:50%; transform:translateX(-50%); max-width:480px; width:100%; height:100%; z-index:20; background:var(--paper-white); display:none; flex-direction:column; align-items:center; justify-content:center; gap:24px; }
        .call-screen.active { display:flex; }
        .call-avatar { width:84px; height:84px; border-radius:var(--radius-md); object-fit:cover; background:var(--moonlight-warm); box-shadow:0 4px 16px var(--shadow-color); }
        .call-timer { font-family:var(--font-serif); font-size:20px; color:var(--light-ink); letter-spacing:2px; }
        .btn-hangup { width:60px; height:60px; border-radius:50%; background:#e8c0c0; border:none; cursor:pointer; font-size:26px; display:flex; align-items:center; justify-content:center; box-shadow:0 3px 12px rgba(200,150,150,0.3); transition:transform 0.15s ease; }
        .btn-hangup:active { transform:scale(0.92); }
        .wordcard-page { position:absolute; top:0; left:0; width:100%; height:100%; z-index:5; background:var(--paper-white); display:none; flex-direction:column; }
        .wordcard-page.active { display:flex; }
        .wordcard-tabs { display:flex; gap:0; padding:6px 8px 10px; overflow-x:auto; flex-shrink:0; background:var(--paper-white); -webkit-overflow-scrolling:touch; }
        .wordcard-tab { flex-shrink:0; padding:7px 12px; font-size:12px; color:var(--lighter-ink); cursor:pointer; font-family:var(--font-serif); border-radius:16px; margin:0 3px; transition:all 0.2s; white-space:nowrap; background:var(--moonlight-warm); }
        .wordcard-tab.active { color:var(--ink-gray); background:var(--milk-white); box-shadow:0 1px 3px var(--shadow-color); }
        .subpool-tabs { display:flex; gap:4px; padding:4px 16px 8px; overflow-x:auto; flex-shrink:0; -webkit-overflow-scrolling:touch; align-items:center; }
        .subpool-tab { flex-shrink:0; padding:6px 14px; font-size:12px; color:var(--lighter-ink); cursor:pointer; font-family:var(--font-serif); border-radius:14px; background:var(--moonlight-warm); transition:all 0.2s; white-space:nowrap; }
        .subpool-tab.active { color:var(--ink-gray); background:var(--milk-white); box-shadow:0 1px 2px var(--shadow-color); }
        .pool-total-count { font-size:12px; color:var(--lighter-ink); padding:0 16px 4px; flex-shrink:0; font-family:var(--font-serif); }
        .wordcard-input-area { padding:6px 16px 10px; flex-shrink:0; }
        .wordcard-textarea { width:100%; padding:10px 14px; border:none; border-radius:var(--radius-sm); background:var(--moonlight-cool); font-family:var(--font-serif); font-size:14px; color:var(--ink-gray); outline:none; resize:vertical; min-height:60px; line-height:1.6; box-shadow:inset 0 1px 2px var(--shadow-color); -webkit-user-select:text; user-select:text; }
        .wordcard-textarea::placeholder { color:var(--lighter-ink); }
        .wordcard-add-btn { display:block; width:100%; padding:10px; margin-top:8px; border:none; border-radius:var(--radius-md); background:var(--milk-white); font-family:var(--font-serif); font-size:14px; color:var(--ink-gray); cursor:pointer; box-shadow:0 1px 3px var(--shadow-color); transition:transform 0.15s ease; }
        .wordcard-add-btn:active { transform:scale(0.97); }

        .wordcard-action-btn { padding:5px 10px; font-size:11px; border-radius:12px; border:none; cursor:pointer; font-family:var(--font-serif); background:var(--moonlight-warm); color:var(--light-ink); transition:all 0.15s; }
        .wordcard-action-btn:active { background:var(--milk-white); }
        .wordcard-list { flex:1; overflow-y:auto; padding:0 16px 16px; -webkit-overflow-scrolling:touch; }
        .wordcard-item { display:flex; align-items:center; gap:8px; padding:10px 12px; margin-bottom:6px; background:var(--milk-white); border-radius:var(--radius-sm); box-shadow:0 1px 2px var(--shadow-color); font-family:var(--font-serif); font-size:14px; color:var(--ink-gray); transition:background 0.2s; }
        .wordcard-item.selected { background:#f0e8e0; box-shadow:0 0 0 2px var(--heart-pink); }
        .wordcard-item .wc-content { flex:1; word-break:break-word; line-height:1.4; }
        .wordcard-item .wc-actions { display:flex; gap:4px; flex-shrink:0; }
        .wc-btn { width:28px; height:28px; border-radius:50%; border:none; cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center; background:var(--moonlight-warm); color:var(--light-ink); transition:all 0.15s; }
        .wc-btn:active { background:var(--milk-white); }

<script>
(function() {
'use strict';

if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
        var swCode = 'var CACHE_NAME="yiwu-v1.3.3";self.addEventListener("install",function(e){e.waitUntil(caches.open(CACHE_NAME).then(function(c){return c.addAll(["/"])}))});self.addEventListener("fetch",function(e){e.respondWith(caches.match(e.request).then(function(r){return r||fetch(e.request)}))});';
        var blob = new Blob([swCode], {type:'application/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(function(){});

}

var LS = {
    get: function(key, def) {
        try { var v = localStorage.getItem('yw_'+key); return v !== null ? JSON.parse(v) : def; }
        catch(e) { return def; }
    },
    set: function(key, val) {
        try { localStorage.setItem('yw_'+key, JSON.stringify(val)); }
        catch(e) { showToast('存储空间不足'); }
    }
};

var DB_NAME = 'YiWuChat', DB_VERSION = 2, db = null;

function openDB() {
    return new Promise(function(rs, rj) {
        var r = indexedDB.open(DB_NAME, DB_VERSION);
        r.onupgradeneeded = function(e) {
            var d = e.target.result;
            if (!d.objectStoreNames.contains('messages')) {
                var s = d.createObjectStore('messages', {keyPath:'id', autoIncrement:true});
                s.createIndex('timestamp','timestamp',{unique:false});
            }
            if (!d.objectStoreNames.contains('emojis')) d.createObjectStore('emojis', {keyPath:'id', autoIncrement:true});
            if (!d.objectStoreNames.contains('wordcards')) d.createObjectStore('wordcards', {keyPath:'id', autoIncrement:true});
        };
        r.onsuccess = function(e) { db = e.target.result; rs(db); };
        r.onerror = function() { rj(r.error); };
    });
}

function dbAdd(sn, data) {
    return new Promise(function(rs, rj) {
        var tx = db.transaction(sn,'readwrite'), st = tx.objectStore(sn);
        var r = st.add(data); r.onsuccess = function() { rs(r.result); }; r.onerror = function() { rj(r.error); };
    });
}

function dbPut(sn, data) {
    return new Promise(function(rs, rj) {
        var tx = db.transaction(sn,'readwrite'), st = tx.objectStore(sn);
        var r = st.put(data); r.onsuccess = function() { rs(r.result); }; r.onerror = function() { rj(r.error); };
    });
}

function dbGetAll(sn) {
    return new Promise(function(rs, rj) {
        var tx = db.transaction(sn,'readonly'), st = tx.objectStore(sn);
        var r = st.getAll(); r.onsuccess = function() { rs(r.result); }; r.onerror = function() { rj(r.error); };
    });
}

function dbGetPaginated(sn, offset, limit) {
    return new Promise(function(rs, rj) {
        var tx = db.transaction(sn,'readonly'), st = tx.objectStore(sn);
        var idx = st.index('timestamp'), results = [], count = 0, skipped = 0;
        var r = idx.openCursor(null, 'prev');
        r.onsuccess = function(e) {
            var c = e.target.result;
            if (!c) { rs(results.reverse()); return; }
            if (skipped < offset) { skipped++; c.continue(); return; }
            if (count >= limit) { rs(results.reverse()); return; }
            results.push(c.value); count++; c.continue();
        };
        r.onerror = function() { rj(r.error); };
    });
}

function dbClear(sn) {
    return new Promise(function(rs, rj) {
        var tx = db.transaction(sn,'readwrite'), st = tx.objectStore(sn);
        var r = st.clear(); r.onsuccess = function() { rs(); }; r.onerror = function() { rj(r.error); };
    });
}

var state = {
    hisName:'易遇', hisNick:'老公', myName:'雾凉', myNick:'乖宝',
    hisAvatar:'', myAvatar:'', hisStatus:'', hisSignature:'', chatBg:'',

    currentCallType:null, callStartTime:null, callInterval:null,

    lastUserMessageTime:0,
    wordcardData:{}, wordcardFoldState:{},
    wcCurrentTab:0, wcCurrentSubpool:0, _wcCurrentGroup:null, wcSearchResults:[],
    exclusiveCards:[], exclusiveDeleteChance:{used:false,date:''}, teachPairs:[],
    wcSelectAll:false, wcSelectedCards:[]
};

function $(s) { return document.querySelector(s); }
function $$(s) { return document.querySelectorAll(s); }
function escHTML(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function formatTime(ts) { var d = new Date(ts); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
function getDateStr(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function downloadJSON(data,fn) {
    var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');
    a.href=url;a.download=fn;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(function(){URL.revokeObjectURL(url);},100);
}

function loadAllSettings() {
    state.hisName = LS.get('hisName','易遇'); state.hisNick = LS.get('hisNick','老公');
    state.myName = LS.get('myName','雾凉'); state.myNick = LS.get('myNick','乖宝');
    state.hisAvatar = LS.get('hisAvatar',''); state.myAvatar = LS.get('myAvatar','');
    state.hisStatus = LS.get('hisStatus',''); state.hisSignature = LS.get('hisSignature','');
    state.chatBg = LS.get('chatBg','');
    state.wordcardFoldState = LS.get('wcFoldState',{});
    state.exclusiveCards = LS.get('exclusiveCards',[]);
    state.exclusiveDeleteChance = LS.get('exclusiveDeleteChance',{used:false,date:''});
    state.teachPairs = LS.get('teachPairs',[]);
}

function saveAllSettings() {
    LS.set('hisName',state.hisName); LS.set('hisNick',state.hisNick);
    LS.set('myName',state.myName); LS.set('myNick',state.myNick);
    LS.set('hisAvatar',state.hisAvatar); LS.set('myAvatar',state.myAvatar);
    LS.set('hisStatus',state.hisStatus); LS.set('hisSignature',state.hisSignature);
    LS.set('chatBg',state.chatBg); LS.set('wcFoldState',state.wordcardFoldState);
    LS.set('exclusiveCards',state.exclusiveCards); LS.set('exclusiveDeleteChance',state.exclusiveDeleteChance);
    LS.set('teachPairs',state.teachPairs);
}

async function loadEmojis() { state.emojis = await dbGetAll('emojis'); renderEmojiGrid(); }
function renderEmojiGrid() {
    var g = $('#emojiGrid'); if (!g) return; g.innerHTML = '';
    state.emojis.forEach(function(e) {
        var d = document.createElement('div'); d.className = 'emoji-item';
        var img = document.createElement('img'); img.src = e.data; d.appendChild(img);
        d.onclick = function() { sendEmoji(e.data); }; g.appendChild(d);
    });
    var add = document.createElement('div'); add.className = 'emoji-add'; add.textContent = '+'; add.onclick = addEmoji; g.appendChild(add);
}
function addEmoji() {
    var inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'image/*';
    inp.onchange = async function(e) {
        var f = e.target.files[0]; if (!f) return;
        var reader = new FileReader();
        reader.onload = async function(ev) { await dbAdd('emojis', {data:ev.target.result, timestamp:Date.now()}); await loadEmojis(); };
        reader.readAsDataURL(f);
    }; inp.click();
}
function sendEmoji(data) { closeEmojiPanel(); sendMessage(data, 'image'); }

async function loadMessages() {
    var msgs = await dbGetPaginated('messages', 0, state.PAGE_SIZE);
    state.messagesLoaded = msgs.length; renderAllMessages(msgs);
    if (msgs.length > 0) setTimeout(function() { $('#messagesContainer').scrollTop = $('#messagesContainer').scrollHeight; }, 150);
}
function renderAllMessages(msgs) { var c = $('#messagesContainer'); c.innerHTML = ''; msgs.forEach(function(m) { renderOneMessage(m, c); }); }
function renderOneMessage(msg, container) {

function addToExclusiveIfNew(content, source) {
    var exists = state.exclusiveCards.some(function(c) { return (typeof c==='string'?c:(c.content||'')) === content; });
    if (exists) return;
    var allReply = getAllReplyCards();
    var found = allReply.some(function(c) { return (typeof c==='string'?c:(c.content||'')) === content; });

function moveFromReplyToExclusive(content) {

            var arr = poolData[gk] || [];

    var combos = [];

    if (weatherCards.length>0 && dailyCards.length>0) combos.push([weatherCards,dailyCards]);
    if (weatherCards.length>0 && moodCards.length>0) combos.push([weatherCards,moodCards]);

    if (combos.length===0) {
        var text = ''; if (state.hisStatus) text = state.hisStatus;

function addWordcards() {
    var info = getCurrentPoolInfo(), raw = $('#wcTextarea').value.trim(); if (!raw) return;
    var lines;
    if (info.subpoolKey==='emoji') {
        lines = [];
        raw.split('\n').forEach(function(line) {
            line = line.trim(); if (!line) return;
            var emojis = line.match(/[\u{1F000}-\u{1FFFF}\u{2600}-\u{27BF}\u{2300}-\u{23FF}\u{2B50}\u{2764}\u{1F900}-\u{1F9FF}\u{1FA00}-\u{1FA6F}\u{1FA70}-\u{1FAFF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{200D}\u{FE0F}\u{20E3}]/gu);
            if (emojis && emojis.length>0) lines = lines.concat(emojis);
            else lines = lines.concat(line.split(/[,，]+/).map(function(s){return s.trim();}).filter(Boolean));
        });
    }
    else if (info.subpoolKey==='song') lines = raw.split('\n').filter(function(l){return l.trim()&&l.indexOf('｜')!==-1;});
    else lines = raw.split('\n').filter(function(l){return l.trim();});
    if (lines.length===0) return;
    var pk=info.poolKey,sk=info.subpoolKey,gk=info.groupKey||'_nogroup';
    if(!state.wordcardData[pk])state.wordcardData[pk]={}; if(!state.wordcardData[pk][sk])state.wordcardData[pk][sk]={}; if(!state.wordcardData[pk][sk][gk])state.wordcardData[pk][sk][gk]=[];
    lines.forEach(function(line){state.wordcardData[pk][sk][gk].push({id:Date.now()+Math.random(),content:line.trim(),groupKey:gk});});
    saveWordcardData(); $('#wcTextarea').value=''; renderWordcardPage(); showToast('已添加 '+lines.length+' 条字卡');
}

                if(moveOpts.length===0){showToast('没有可移动的目标池子');return;}
                showMovePopup(moveOpts,function(targetSk){
                    var targetGk='_nogroup';if(!state.wordcardData[pk])state.wordcardData[pk]={};if(!state.wordcardData[pk][targetSk])state.wordcardData[pk][targetSk]={};if(!state.wordcardData[pk][targetSk][targetGk])state.wordcardData[pk][targetSk][targetGk]=[];
                    arr.forEach(function(c){state.wordcardData[pk][targetSk][targetGk].push(c);});
                    clearCurrentPool(pk,sk,gk);saveWordcardData();state.wcSelectAll=false;renderWordcardPage();showToast('已批量移动到 '+targetSk);
                });
                break;
        }
    };});
}
function getTargetArray(pk,sk,gk){if(!state.wordcardData[pk]||!state.wordcardData[pk][sk]||!state.wordcardData[pk][sk][gk])return null;return state.wordcardData[pk][sk][gk];}
function setTargetArray(pk,sk,gk,arr){if(!state.wordcardData[pk])state.wordcardData[pk]={};if(!state.wordcardData[pk][sk])state.wordcardData[pk][sk]={};state.wordcardData[pk][sk][gk]=arr;}
function clearCurrentPool(pk,sk,gk){if(state.wordcardData[pk]&&state.wordcardData[pk][sk]){if(gk==='_nogroup'||(sk!=='reply'&&sk!=='song'))state.wordcardData[pk][sk]={};else delete state.wordcardData[pk][sk][gk];}}

function performSearch(){
    var q=$('#searchInput').value.trim().toLowerCase();if(!q){state.wcSearchResults=[];renderSearchResults();return;}
    var results=[];['emoji','action','reply','song'].forEach(function(sk){var pd=state.wordcardData[sk]||{};Object.keys(pd).forEach(function(gk){(pd[gk]||[]).forEach(function(card){if(card.content.toLowerCase().indexOf(q)!==-1)results.push({card:card,poolKey:'content',subpoolKey:sk,groupKey:gk,subpoolLabel:getSubpoolLabel(sk)});});});});
    state.wcSearchResults=results;renderSearchResults();
}
function getSubpoolLabel(key){var labels={emoji:'Emoji池',action:'动作池',reply:'回复池',song:'歌单池',weather:'天气池',daily:'日常池',mood:'心情池'};return labels[key]||key;}
function renderSearchResults(){
    var list=$('#wcList'),info=$('#searchResultInfo'),results=state.wcSearchResults;
    if(results.length===0){info.textContent='搜索结果（0）';list.innerHTML='<div class="settings-dev">未找到匹配的字卡</div>';return;}
    info.textContent='搜索结果（'+results.length+'）';list.innerHTML='';
    results.forEach(function(r){var item=document.createElement('div');item.className='wordcard-item';var c=document.createElement('div');c.className='wc-content';c.textContent=r.card.content;var m=document.createElement('div');m.className='search-result-meta';m.textContent=r.subpoolLabel+(r.groupKey!=='_nogroup'?' · '+r.groupKey:'');c.appendChild(m);item.appendChild(c);var a=document.createElement('div');a.className='wc-actions';var eb=document.createElement('button');eb.className='wc-btn';eb.innerHTML='✏️';eb.onclick=function(){editCard(r.card,r.poolKey,r.subpoolKey,r.groupKey);};var db=document.createElement('button');db.className='wc-btn danger';db.innerHTML='✕';db.onclick=function(){deleteCard(r.card,r.poolKey,r.subpoolKey,r.groupKey);};var mb=document.createElement('button');mb.className='wc-btn';mb.innerHTML='📦';mb.onclick=function(){moveCardUI(r.card,r.poolKey,r.subpoolKey,r.groupKey);};a.appendChild(eb);a.appendChild(db);a.appendChild(mb);item.appendChild(a);list.appendChild(item);});
}

function renderExportList(info){
    var list=$('#exportList');if(info.poolKey!=='export')return;list.innerHTML='';
    var allPools=[{label:'☀️ 系统状态池',pools:[{key:'weather',icon:'⛅',label:'天气池'},{key:'daily',icon:'🍀',label:'日常池'},{key:'mood',icon:'🌸',label:'心情池'}]},{label:'💬 内容回复池',pools:[{key:'emoji',icon:'😊',label:'Emoji池'},{key:'action',icon:'💃',label:'动作池'},{key:'reply',icon:'💭',label:'回复池'},{key:'song',icon:'🎵',label:'歌单池'}]},{label:'🩷 易遇专属回复池',special:'exclusive'}];
    var html='';allPools.forEach(function(g){html+='<div class="settings-section-title">—— '+g.label+' ——</div>';if(g.special==='exclusive'){html+='<div class="export-item"><span class="exp-label">🩷 易遇专属回复池（'+state.exclusiveCards.length+'）</span><button class="exp-btn" data-export="exclusive">导出</button></div>';}else{g.pools.forEach(function(p){var rc=0;['status','content'].forEach(function(pk){if(state.wordcardData[pk]&&state.wordcardData[pk][p.key])Object.values(state.wordcardData[pk][p.key]).forEach(function(arr){rc+=arr.length;});});html+='<div class="export-item"><span class="exp-label">'+p.icon+' '+p.label+'（'+rc+'）</span><button class="exp-btn" data-export="'+p.key+'">导出</button></div>';});}});
    html+='<button class="export-all-btn" id="exportAllPools">一键导出全部池子</button>';list.innerHTML=html;
    list.querySelectorAll('.exp-btn').forEach(function(b){b.onclick=function(){var k=b.dataset.export;if(k==='exclusive'){downloadJSON({exclusiveCards:state.exclusiveCards,exportTime:new Date().toISOString()},'字卡_专属回复池_'+getDateStr()+'.json');showToast('📤 已导出');}else exportSubpool(k);};});
    var eab=$('#exportAllPools');if(eab)eab.onclick=exportAllPools;
}
function exportSubpool(sk){var cards=[];['status','content'].forEach(function(pk){if(state.wordcardData[pk]&&state.wordcardData[pk][sk])Object.values(state.wordcardData[pk][sk]).forEach(function(arr){cards=cards.concat(arr.map(function(c){return c.content;}));});});downloadJSON({subpool:sk,wordCards:cards,exportTime:new Date().toISOString()},'字卡_'+sk+'_'+getDateStr()+'.json');showToast('📤 已导出 '+cards.length+' 条');}
function exportAllPools(){var ad={};Object.keys(state.wordcardData).forEach(function(pk){ad[pk]={};Object.keys(state.wordcardData[pk]).forEach(function(sk){ad[pk][sk]={};Object.keys(state.wordcardData[pk][sk]).forEach(function(gk){ad[pk][sk][gk]=state.wordcardData[pk][sk][gk].map(function(c){return c.content;});});});});ad.exclusive=state.exclusiveCards.map(function(c){return typeof c==='string'?c:c.content;});ad.teachPairs=state.teachPairs;downloadJSON({version:'1.3.3',exportTime:new Date().toISOString(),allPools:ad},'字卡_全部池子_'+getDateStr()+'.json');showToast('📤 全部池子已导出');}

function renderExclusiveList(list){
    if(state.exclusiveCards.length===0){list.innerHTML='<div class="settings-dev">易遇还没有学到的字卡<br>他会从对话中学习</div>';return;}
    checkExclusiveDeleteChance();var today=new Date().toDateString(),used=state.exclusiveDeleteChance.date===today&&state.exclusiveDeleteChance.used;
    var id=document.createElement('div');id.className='exclusive-info';id.textContent='今日删除申请：'+(used?'已使用':'1/1')+' · 明天刷新';list.appendChild(id);
    if(!used){var ab=document.createElement('button');ab.className='wordcard-add-btn';ab.textContent='申请删除一条字卡（今天1/1）';ab.style.marginBottom='10px';ab.onclick=function(){applyDeleteExclusive();};list.appendChild(ab);}
    var cb=document.createElement('button');cb.className='wordcard-add-btn';cb.textContent='清空全部学习记录';cb.style.marginBottom='10px';cb.style.background='#f0e0e0';cb.onclick=function(){showToast('确认清空易遇的全部学习记录？',true,function(){state.exclusiveCards=[];saveAllSettings();renderWordcardPage();showToast('已清空');});};list.appendChild(cb);
    state.exclusiveCards.forEach(function(card){var content=typeof card==='string'?card:(card.content||''),source=typeof card==='string'?'':(card.source||'');var item=document.createElement('div');item.className='wordcard-item';item.innerHTML='<div class="wc-content">'+escHTML(content)+'<div class="search-result-meta">来源：'+(source||'学习')+' · 权重：'+(card.weight||1)+'</div></div>';list.appendChild(item);});
}
function checkExclusiveDeleteChance(){var today=new Date().toDateString();if(state.exclusiveDeleteChance.date!==today){state.exclusiveDeleteChance={used:false,date:today};saveAllSettings();}}
function applyDeleteExclusive(){if(state.exclusiveCards.length===0){showToast('专属池为空');return;}var card=state.exclusiveCards[Math.floor(Math.random()*state.exclusiveCards.length)],content=typeof card==='string'?card:card.content,agree=Math.random()<0.5;state.exclusiveDeleteChance.used=true;saveAllSettings();if(agree){state.exclusiveCards=state.exclusiveCards.filter(function(c){return(typeof c==='string'?c:(c.content||''))!==content;});saveAllSettings();renderWordcardPage();showToast('好，听你的。\n已删除');}else{renderWordcardPage();showToast('这条我还想说…\n让我留着吧。');}}

function renderTeachPage(){
    var container=$('#teachContent');if(!container)return;container.innerHTML='';
    var r1=document.createElement('div');r1.className='teach-row mine';var a1=document.createElement('img');a1.className='teach-avatar';if(state.myAvatar)a1.src=state.myAvatar;r1.appendChild(a1);var b1=document.createElement('div');b1.className='teach-bubble';var i1=document.createElement('input');i1.type='text';i1.className='teach-input';i1.placeholder='当我说...';i1.id='teachTrigger';b1.appendChild(i1);r1.appendChild(b1);container.appendChild(r1);
    var r2=document.createElement('div');r2.className='teach-row theirs';var a2=document.createElement('img');a2.className='teach-avatar';if(state.hisAvatar)a2.src=state.hisAvatar;r2.appendChild(a2);var b2=document.createElement('div');b2.className='teach-bubble';var i2=document.createElement('input');i2.type='text';i2.className='teach-input';i2.placeholder='易遇回复...';i2.id='teachReply';b2.appendChild(i2);r2.appendChild(b2);container.appendChild(r2);
    var sb=document.createElement('button');sb.className='btn-save-reshape';sb.textContent='铭刻于心';sb.onclick=function(){var tg=document.getElementById('teachTrigger'),rp=document.getElementById('teachReply');var t=tg?tg.value.trim():'',r=rp?rp.value.trim():'';if(!t||!r){showToast('请填写完整');return;}if(state.teachPairs.some(function(p){return p.trigger===t&&p.reply===r;})){showToast('该配对已存在');return;}state.teachPairs.push({trigger:t,reply:r,timestamp:Date.now()});saveAllSettings();addToExclusiveIfNew(r,'teach');renderTeachPage();showToast('铭刻于心\n已保存');};container.appendChild(sb);
    var sep=document.createElement('div');sep.className='reshape-title';sep.style.marginTop='20px';sep.textContent='—— 🩷 已有的教学配对 🩷 ——';container.appendChild(sep);
    if(state.teachPairs.length===0){var empty=document.createElement('div');empty.className='settings-dev';empty.textContent='还没有教学配对';container.appendChild(empty);}else{state.teachPairs.forEach(function(pair,idx){var pe=document.createElement('div');pe.className='teach-pair';var pc=document.createElement('div');pc.className='teach-pair-content';pc.innerHTML='<div style="font-size:12px;color:var(--lighter-ink);">当我说：</div><div>'+escHTML(pair.trigger)+'</div><div style="font-size:12px;color:var(--lighter-ink);margin-top:4px;">易遇回复：</div><div>'+escHTML(pair.reply)+'</div>';pe.appendChild(pc);var del=document.createElement('button');del.className='teach-pair-del';del.innerHTML='✕';del.onclick=function(){state.teachPairs.splice(idx,1);saveAllSettings();renderTeachPage();};pe.appendChild(del);container.appendChild(pe);});}
}

async function initApp(){
    try{
        await openDB();
        loadAllSettings();
        await loadEmojis();
        await loadMessages();
        await loadWordcardData();
        updateAllChatUI();
        bindEvents();
        startStatusCycle();
        startActiveChat();
        if(state.messagesLoaded===0)$('#messagesContainer').innerHTML='';
        buildMoreGrid();
        setTimeout(bindWordcardActions,800);
        console.log('易遇🩷雾凉 v1.3.3 就绪');
    }catch(e){
        console.error('初始化失败',e);
        showToast('初始化失败：'+e.message+'\n请刷新页面重试');
    }
}

initApp();

})();
</script>
